name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache project buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ github.run_id }}
          restore-keys: buildozer-project-${{ runner.os }}-

      - name: Build Docker image
        run: docker build -t bisync-buildozer .

      - name: Build APK
        run: |
          docker run --rm \
            --volume "$PWD":/home/builder/hostcwd \
            --volume "$HOME/.buildozer":/home/builder/.buildozer \
            bisync-buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bisync-apk
          path: ./bin/*.apk
