name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" main.py

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build rclone for android/arm64 with CGO (working DNS)
        env:
          RCLONE_VERSION: v1.69.1
        run: |
          mkdir -p assets
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          git clone --depth 1 --branch "$RCLONE_VERSION" https://github.com/rclone/rclone.git /tmp/rclone-src
          cd /tmp/rclone-src
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 CC="$CC" \
            go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/assets/librclone.so" .
          file "$GITHUB_WORKSPACE/assets/librclone.so"
          ls -lh "$GITHUB_WORKSPACE/assets/librclone.so"

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache project buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-project-${{ runner.os }}-

      - name: Cache Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile') }}

      - name: Load or build Docker image
        run: |
          if [ -f /tmp/docker-image/bisync-buildozer.tar ]; then
            docker load -i /tmp/docker-image/bisync-buildozer.tar
          else
            docker build -t bisync-buildozer .
            mkdir -p /tmp/docker-image
            docker save bisync-buildozer -o /tmp/docker-image/bisync-buildozer.tar
          fi

      - name: Build APK
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/bisync.keystore
          mkdir -p "$HOME/.buildozer"
          sudo chown -R 1000:1000 "$HOME/.buildozer" .
          docker run --rm \
            --volume "$PWD":/home/builder/hostcwd \
            --volume "$HOME/.buildozer":/home/builder/.buildozer \
            --volume "$RUNNER_TEMP/bisync.keystore":/home/builder/hostcwd/bisync.keystore:ro \
            -e P4A_RELEASE_KEYSTORE=/home/builder/hostcwd/bisync.keystore \
            -e P4A_RELEASE_KEYSTORE_PASSWD="$KEYSTORE_PASSWORD" \
            -e P4A_RELEASE_KEYALIAS="$KEY_ALIAS" \
            -e P4A_RELEASE_KEYALIAS_PASSWD="$KEY_PASSWORD" \
            bisync-buildozer android release 2>&1 | tee /tmp/buildozer.log

      - name: Extract full gradle error on failure
        if: failure()
        run: |
          echo "=== Full buildozer log (last 300 lines) ==="
          tail -300 /tmp/buildozer.log

          echo ""
          echo "=== Attempting direct gradle build with --stacktrace for real error ==="
          sudo chown -R $(id -u):$(id -g) . .buildozer 2>/dev/null || true
          DIST=$(ls -d .buildozer/android/platform/build-arm64-v8a/dists/* 2>/dev/null | head -1)
          if [ -n "$DIST" ]; then
            echo "DIST=$DIST"
            cd "$DIST"
            ./gradlew assembleRelease --stacktrace 2>&1 | tail -200
          else
            echo "No dist directory found"
          fi

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) ./bin ./assets

      - name: Rename APK with version
        id: rename
        run: |
          APK=$(ls ./bin/*.apk | head -1)
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp "$APK" "./bin/bisync-${VERSION}.apk"
          echo "apk_path=./bin/bisync-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bisync-apk
          path: ${{ steps.rename.outputs.apk_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
