name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" main.py

      - name: Download rclone binary
        run: |
          mkdir -p assets
          curl -L https://downloads.rclone.org/rclone-current-linux-arm64.zip -o /tmp/rclone.zip
          cd /tmp && unzip -o rclone.zip
          cp /tmp/rclone-*-linux-arm64/rclone "$GITHUB_WORKSPACE/assets/librclone.so"

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache project buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-project-${{ runner.os }}-

      - name: Cache Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile') }}

      - name: Load or build Docker image
        run: |
          if [ -f /tmp/docker-image/bisync-buildozer.tar ]; then
            docker load -i /tmp/docker-image/bisync-buildozer.tar
          else
            docker build -t bisync-buildozer .
            mkdir -p /tmp/docker-image
            docker save bisync-buildozer -o /tmp/docker-image/bisync-buildozer.tar
          fi

      - name: Build APK
        run: |
          mkdir -p "$HOME/.buildozer"
          sudo chown -R 1000:1000 "$HOME/.buildozer" .
          docker run --rm \
            --volume "$PWD":/home/builder/hostcwd \
            --volume "$HOME/.buildozer":/home/builder/.buildozer \
            bisync-buildozer android debug

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) ./bin

      - name: Rename APK with version
        id: rename
        run: |
          APK=$(ls ./bin/*.apk | head -1)
          VERSION="${GITHUB_REF_NAME:-dev}"
          NEW_NAME="bisync-${VERSION}.apk"
          cp "$APK" "./bin/$NEW_NAME"
          echo "apk_path=./bin/$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bisync-apk
          path: ${{ steps.rename.outputs.apk_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
